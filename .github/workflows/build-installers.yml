name: Build installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macos-dmg
            bundles: dmg
          - os: windows-latest
            artifact_name: windows-exe
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Build Tauri installer
        working-directory: apps/desktop
        run: npm run tauri -- build --ci --no-sign --bundles ${{ matrix.bundles }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error
