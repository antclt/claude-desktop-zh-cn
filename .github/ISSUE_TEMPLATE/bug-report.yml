name: 问题反馈
description: 提交使用本项目时遇到的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。为了更快定位，请尽量完整填写下面的信息。

  - type: dropdown
    id: platform
    attributes:
      label: 平台是啥
      description: 请选择你使用的平台
      options:
        - macOS
        - Windows
        - 其他
    validations:
      required: true

  - type: input
    id: claude_version
    attributes:
      label: Clade Desktop版本是多少
      description: 请填写 Claude Desktop 版本号，例如 0.11.2
      placeholder: 例如 x.xx.x
    validations:
      required: true

  - type: dropdown
    id: third_party_api_mode
    attributes:
      label: 是否用的第三方 API 模式
      description: README 提到本项目仅支持 API 使用方式，请说明当前是否启用了第三方模式
      options:
        - 是
        - 否
        - 不确定
    validations:
      required: true

  - type: textarea
    id: problem_description
    attributes:
      label: 问题描述
      description: 请简要描述你遇到的问题
      placeholder: 例如：安装完成后 Claude 无法启动，或界面没有切换成中文
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: 复现步骤
      description: 请按顺序写出你做了什么，方便复现
      placeholder: |
        1. 打开...
        2. 运行...
        3. 看到...
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: 实际表现
      description: 请贴出报错信息、日志或截图说明
      placeholder: 例如：报错弹窗内容、终端输出、截图等
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 期望结果
      description: 你原本预期应该发生什么
      placeholder: 例如：Claude 正常启动并切换到中文界面
    validations:
      required: false

  - type: textarea
    id: extra_context
    attributes:
      label: 补充信息
      description: 其他可能有帮助的信息，例如是否刚更新过 Claude、是否改过配置文件等
      placeholder: 可选
    validations:
      required: false
